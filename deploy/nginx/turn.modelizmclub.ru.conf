# HTTP vhost for turn.modelizmclub.ru — ACME + health check.
# Coturn handles TURN on 3478/5349 directly (not proxied through nginx).
server {
    listen 80;
    listen [::]:80;
    server_name turn.modelizmclub.ru;

    root /var/www/modelizmclub/backend/public;

    location /.well-known/acme-challenge/ {
        allow all;
    }

    location / {
        default_type text/plain;
        return 200 "ok";
    }
}
