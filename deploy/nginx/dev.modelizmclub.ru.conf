server {
    listen 80;
    listen [::]:80;
    server_name dev.modelizmclub.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.modelizmclub.ru;

    root /var/www/modelizmclub/backend/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/dev.modelizmclub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.modelizmclub.ru/privkey.pem;

    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
