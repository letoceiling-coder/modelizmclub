server {
    listen 80;
    listen [::]:80;
    server_name neeklo-api.modelizmclub.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name neeklo-api.modelizmclub.ru;

    root /var/www/modelizmclub-neeklo/backend/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/neeklo-api.modelizmclub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/neeklo-api.modelizmclub.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 100M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
