# Production frontend (TanStack Start / Nitro node-server on :3000).
server {
    listen 80;
    listen [::]:80;
    server_name modelizmclub.ru www.modelizmclub.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name modelizmclub.ru www.modelizmclub.ru;

    ssl_certificate     /etc/letsencrypt/live/modelizmclub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/modelizmclub.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
