# Production frontend (TanStack Start / Nitro node-server on :3000).
server {
    listen 80;
    listen [::]:80;
    server_name modelizmclub.ru www.modelizmclub.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name modelizmclub.ru www.modelizmclub.ru;

    ssl_certificate     /etc/letsencrypt/live/modelizmclub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/modelizmclub.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 50M;

    # Laravel API (master backend) — webhooks, same code as api.modelizmclub.ru.
    location ^~ /api/ {
        client_max_body_size 100M;
        include fastcgi.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param DOCUMENT_ROOT /var/www/modelizmclub/backend/public;
        fastcgi_param SCRIPT_FILENAME /var/www/modelizmclub/backend/public/index.php;
        fastcgi_read_timeout 120s;
    }

    # Content-hashed build assets — filenames change on every build (Vite fingerprints),
    # so they are safe to cache forever. Keep the upstream `immutable` header.
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSR HTML documents and everything else — must never be cached, otherwise browsers
    # keep loading an old document that references stale asset hashes. With no-cache every
    # deploy is picked up automatically and no user ever needs to clear their cache.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # `add_header` in a location resets inherited headers, so re-declare the
        # security headers here alongside the no-cache policy.
        proxy_hide_header Cache-Control;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }
}
